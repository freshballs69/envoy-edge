# Template — rendered at container start (sed fills __HOME_ADDR__/__HOME_PORT__
# from .env). Do not edit the placeholders; set them in .env.
#
# Raw TCP in -> ONE HTTP/2 connection out to your home box (per Envoy worker;
# run with --concurrency 1 to keep it to a single connection through the router).

admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }   # localhost-only

static_resources:
  listeners:
    - name: raw_tcp
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }   # internal; Docker maps LISTEN_PORT here
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: raw_tcp
                cluster: home
                idle_timeout: 3600s
                tunneling_config:
                  hostname: "tunnel.local:443"   # :authority of each stream
                  use_post: true                 # POST /c (drop for a real CONNECT backend)
                  post_path: /c
                  headers_to_add:
                    - header: { key: x-client-ip, value: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%" }
                    # - header: { key: x-auth-token, value: "CHANGE_ME" }   # shared secret

  clusters:
    - name: home
      type: STRICT_DNS
      connect_timeout: 10s
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100000
            max_pending_requests: 1000000
            max_requests: 1000000          # concurrent streams cap
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options:
              max_concurrent_streams: 1000000
              connection_keepalive:            # keep the single long-lived conn alive (NAT)
                interval: 30s
                timeout: 10s
      load_assignment:
        cluster_name: home
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: __HOME_ADDR__
                      port_value: __HOME_PORT__
      # --- TLS to home over the internet (recommended): uncomment + set SNI ---
      # transport_socket:
      #   name: envoy.transport_sockets.tls
      #   typed_config:
      #     "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
      #     sni: home.example.com
