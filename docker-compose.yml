# VPS edge: raw TCP -> one HTTP/2 connection to home.
#
#   cp .env.example .env   # set HOME_ADDR / HOME_PORT / LISTEN_PORT
#   docker compose up -d
#
# Host LISTEN_PORT (default 443) is mapped by Docker to the container's internal
# :10000 listener — so binding a low port needs no root/caps inside the container.

services:
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    restart: unless-stopped
    # Tuned for many inbound client connections (the edge accepts them all and
    # folds them onto one upstream conn). These are namespaced net sysctls applied
    # inside the container's netns (works because we use Docker port-publish, not
    # host net). See README "Tuning" for HOST-level knobs (conntrack, fs.file-max).
    ulimits:
      nofile: { soft: 1048576, hard: 1048576 }
    sysctls:
      net.core.somaxconn: "65535"               # accept-queue depth
      net.ipv4.tcp_max_syn_backlog: "65535"     # half-open queue
      net.ipv4.ip_local_port_range: "1024 65535"
      net.ipv4.tcp_fin_timeout: "15"
      net.ipv4.tcp_tw_reuse: "1"
    env_file:
      - .env
    ports:
      - "${LISTEN_PORT:-443}:10000"          # clients hit the VPS on LISTEN_PORT
    volumes:
      - ./envoy.tmpl.yaml:/etc/envoy/envoy.tmpl.yaml:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'sed -e "s|__HOME_ADDR__|$${HOME_ADDR:?set HOME_ADDR in .env}|g" -e "s|__HOME_PORT__|$${HOME_PORT:?set HOME_PORT in .env}|g" /etc/envoy/envoy.tmpl.yaml > /tmp/envoy.yaml && exec envoy -c /tmp/envoy.yaml --concurrency $${CONCURRENCY:-1}'
