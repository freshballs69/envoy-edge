# VPS edge: raw TCP -> one HTTP/2 connection to home.
#
#   cp .env.example .env   # set HOME_ADDR / HOME_PORT / LISTEN_PORT
#   docker compose up -d
#
# HOST NETWORKING: the edge binds LISTEN_PORT directly on the host — no Docker
# NAT, so no conntrack table to overflow under many connections (the reason a
# port-published edge dies at ~100k conns). Runs as root to bind low ports (443).
#
# With host net you CANNOT set net sysctls per-container — set them on the HOST
# (see README "Tuning": somaxconn, nf_conntrack_max, fs.file-max, ...).

services:
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    restart: unless-stopped
    network_mode: host          # bind LISTEN_PORT on the host, no NAT/conntrack
    user: root                  # needed to bind low ports (e.g. 443)
    ulimits:
      nofile: { soft: 1048576, hard: 1048576 }
    env_file:
      - .env
    volumes:
      - ./envoy.tmpl.yaml:/etc/envoy/envoy.tmpl.yaml:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'sed -e "s|__HOME_ADDR__|$${HOME_ADDR:?set HOME_ADDR in .env}|g" -e "s|__HOME_PORT__|$${HOME_PORT:?set HOME_PORT in .env}|g" -e "s|__LISTEN_PORT__|$${LISTEN_PORT:-443}|g" /etc/envoy/envoy.tmpl.yaml > /tmp/envoy.yaml && exec envoy -c /tmp/envoy.yaml --concurrency $${CONCURRENCY:-1}'
